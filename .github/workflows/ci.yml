name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:        # callable as a reusable workflow (release.yml's CI gate)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          set -e
          # The cyrius.cyml `[package].cyrius` pin is the single source of
          # truth for the toolchain version (CLAUDE.md § Rules) — no version
          # is hardcoded in this YAML. Hand the pin to the upstream installer,
          # which fetches the prebuilt release (sha256-verified) and lays it
          # out under $HOME/.cyrius/versions/<v>/ — the versioned layout
          # `cyrius deps` resolves the pinned stdlib snapshot from.
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        # Materialises ./lib/ from the version-matched stdlib snapshot. ./lib/
        # is gitignored (never committed — a vendored copy goes stale vs the
        # pinned compiler's stdlib).
        run: cyrius deps

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/${{ github.event.repository.name }}

      - name: Lint
        # Hard gate: any `warn` line fails CI (matches patra / sigil).
        run: |
          fail=0
          for f in src/*.cyr; do
            out=$(cyrius lint "$f" 2>&1 || true)
            echo "$out"
            if echo "$out" | grep -qE '^[[:space:]]*warn '; then
              echo "lint: warnings in $f"; fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Test
        # Explicit .tcyr path — matches cyrius-bb / cyrius-doom / patra.
        # Bare `cyrius test` auto-discovery can miss the file in CI; naming
        # it is the reliable form. The grep gate fails the job unless the
        # summary line reports 0 failures.
        run: |
          cyrius test tests/cyrius-polyomino.tcyr 2>&1 | tee /tmp/test_output
          tail -1 /tmp/test_output | grep ', 0 failed'

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          for doc in README.md CHANGELOG.md VERSION LICENSE CLAUDE.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md cyrius.cyml; do
            test -f "$doc" && echo "OK: $doc" || { echo "MISSING: $doc"; exit 1; }
          done

      - name: Verify version consistency
        # VERSION is the single source of truth; cyrius.cyml uses the
        # ${file:VERSION} template — resolve it for the comparison. Same
        # shape as cyrius-bb / cyrius-doom CI.
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then
              CYML_VERSION="$FILE_VERSION"
          else
              CYML_VERSION="$CYML_RAW"
          fi
          [ "$FILE_VERSION" = "$CYML_VERSION" ] || { echo "VERSION ($FILE_VERSION) != cyrius.cyml ($CYML_RAW)"; exit 1; }
          grep -q "$FILE_VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent: $FILE_VERSION (cyml: $CYML_RAW)"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    # Pattern scan per first-party-standards § Security Hardening. Cheap,
    # toolchain-free greps over src/ that fail the job on a finding. The
    # P(-1) audit (docs/audit/) is the deep pass; this is the per-push net.
    steps:
      - uses: actions/checkout@v4

      - name: No shell-injection sinks
        run: |
          if grep -rnE 'sys_system|exec_cmd' src/; then
            echo "::error::shell-injection sink in src/ — never pass untrusted input to a shell"
            exit 1
          fi
          echo "OK: no sys_system / exec_cmd in src/"

      - name: No raw execve
        run: |
          if grep -rnE 'execve|syscall\([[:space:]]*59[[:space:]]*,' src/; then
            echo "::error::raw execve in src/"
            exit 1
          fi
          echo "OK: no raw execve in src/"

      - name: No oversized stack buffers (>= 64KB)
        # var name[N] is N BYTES; a stack buffer >= 64KB risks a guard-page
        # smash. Flags any literal-sized stack buffer at or above 65536.
        run: |
          BIG=$(grep -rnoE 'var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]' src/ | awk -F'[][]' '$2+0 >= 65536')
          if [ -n "$BIG" ]; then
            echo "::error::stack buffer >= 64KB in src/:"
            echo "$BIG"
            exit 1
          fi
          echo "OK: no stack buffers >= 64KB in src/"
